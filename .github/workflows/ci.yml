name: Auth Service CI/CD Pipeline

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job de validación y tests
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: auth_service_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Configurar MySQL para tests
      run: |
        echo "spring.datasource.url=jdbc:mysql://localhost:3306/auth_service_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" >> ./src/test/resources/application-test.yml
        echo "spring.datasource.username=testuser" >> ./src/test/resources/application-test.yml
        echo "spring.datasource.password=testpass" >> ./src/test/resources/application-test.yml
    
    - name: Ejecutar tests unitarios
      run: mvn test -Dspring.profiles.active=test
    
    - name: Ejecutar tests de integración con Testcontainers
      run: mvn test -Dtest=**/*IntegrationTest -Dspring.profiles.active=test
    
    - name: Generar reporte de cobertura
      run: mvn jacoco:report
    
    - name: Upload cobertura a Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Upload resultados de tests
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: |
          target/surefire-reports/
          target/failsafe-reports/
        retention-days: 7
    
    - name: Upload reporte de cobertura
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: target/site/jacoco/
        retention-days: 7

  # Job de análisis de código
  sonar:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Ejecutar análisis SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn verify sonar:sonar \
          -Dsonar.projectKey=hospital-auth-service \
          -Dsonar.organization=hospital \
          -Dsonar.host.url=https://sonarcloud.io

  # Job de build y Docker
  build:
    runs-on: ubuntu-latest
    needs: [test, sonar]
    if: github.event_name != 'pull_request'
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extraer metadata de Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
    
    - name: Build y push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_VERSION=${{ steps.meta.outputs.version }}
          BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # Job de seguridad
  security:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ needs.build.outputs.image-tag }}
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Job de despliegue (solo para producción)
  deploy:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'release' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configurar kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Desplegar en Kubernetes
      run: |
        export KUBECONFIG=kubeconfig
        kubectl set image deployment/auth-service auth-service=${{ needs.build.outputs.image-tag }} -n auth-system
        kubectl rollout status deployment/auth-service -n auth-system
    
    - name: Verificar despliegue
      run: |
        export KUBECONFIG=kubeconfig
        kubectl get pods -n auth-system
        kubectl get services -n auth-system

  # Job de notificación
  notify:
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()
    
    steps:
    - name: Notificar éxito
      if: needs.test.result == 'success' && needs.build.result == 'success'
      run: |
        echo "Pipeline completado exitosamente"
        # Aquí se puede agregar notificación a Slack, Teams, etc.
    
    - name: Notificar fallo
      if: needs.test.result == 'failure' || needs.build.result == 'failure'
      run: |
        echo "Pipeline falló"
        # Aquí se puede agregar notificación a Slack, Teams, etc.

  # Job de limpieza
  cleanup:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always() && github.event_name == 'release'
    
    steps:
    - name: Limpiar imágenes antiguas
      run: |
        echo "Limpiando imágenes antiguas del registry"
        # Aquí se puede agregar lógica para limpiar imágenes antiguas
